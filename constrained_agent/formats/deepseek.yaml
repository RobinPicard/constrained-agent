# Format descriptor for DeepSeek models using the json_body style
# with an outer wrapper around all calls.
#
# Style: json_body (with wrapper)
#   The tool name is inside the JSON body. All calls are wrapped in an outer
#   container, and each individual call has its own open/close pair:
#
#     <think>...</think>
#     <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú>
#     <ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>
#     {"name": "tool_name", "parameters": {"param1": "value1"}}
#     <ÔĹútool‚ĖĀcall‚ĖĀendÔĹú>
#     <ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
#
#   Structural tags produce a single StructuralTagItem:
#     begin  = open                         (e.g. "<ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>")
#     schema = anyOf [ {name_field: {const: tool_name}, args_field: tool_schema}, ... ]
#     end    = close                        (e.g. "<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú>")
#   trigger = wrapper_open                  (e.g. "<ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú>")

think:
  prefix: "<think>"
  close: "</think>"

function:
  style: json_body
  wrapper_open:  "<ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú>"
  wrapper_close: "<ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>"
  open:  "<ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>"
  close: "<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú>"
  name_field: name
  args_field: parameters
